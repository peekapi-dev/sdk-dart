name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.6.0"
      - run: dart pub get
      - run: dart test
      - run: dart analyze
      - run: dart format --set-exit-if-changed .
